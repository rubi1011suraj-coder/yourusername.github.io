<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free Games - Space Runner</title>
    <style>
        body {
            background-color: #111;
            color: #ffffff;
            font-family: sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
        }

        /* GAME BOX CONTAINER */
        #game-box {
            width: 320px; 
            height: 180px;
            position: relative;
            margin: 15px auto;
            border: 3px solid #ffffff;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0px 4px 15px rgba(0, 183, 255, 0.4);
            
            /* Bright Blue Sky Gradient */
            background: linear-gradient(180deg, #3a9bdc 0%, #87ceeb 70%, #e0f6ff 100%);
            transition: background 1.5s ease;
        }

        /* MOON ENVIRONMENT MODE (Triggers at 10,000m) */
        #game-box.moon-mode {
            background: linear-gradient(180deg, #020208 0%, #0d0d2b 70%, #202040 100%) !important;
            box-shadow: 0px 0px 20px rgba(180, 0, 255, 0.5);
        }

        /* ENVIRONMENT GRAPHICS */
        .sun {
            position: absolute;
            top: 15px;
            right: 25px;
            width: 30px;
            height: 30px;
            background: #ffde59;
            border-radius: 50%;
            box-shadow: 0px 0px 15px #ffde59;
            transition: opacity 1s ease;
        }

        .moon-graphic {
            position: absolute;
            top: 15px;
            right: 25px;
            width: 35px;
            height: 35px;
            background: #e6e6e6;
            border-radius: 50%;
            box-shadow: 0px 0px 15px #ffffff;
            opacity: 0;
            transition: opacity 1s ease;
        }

        #game-box.moon-mode .sun { opacity: 0; }
        #game-box.moon-mode .moon-graphic { opacity: 1; }

        .cloud {
            position: absolute;
            background: rgba(255, 255, 255, 0.85);
            border-radius: 20px;
            transition: opacity 1s ease;
        }
        .cloud-1 { width: 50px; height: 16px; top: 25px; left: 30px; }
        .cloud-2 { width: 40px; height: 14px; top: 50px; left: 170px; }

        #game-box.moon-mode .cloud { opacity: 0; }

        /* GROUND LINE */
        .ground-line {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 6px;
            background-color: #55aa33;
            transition: background-color 1s ease;
        }

        #game-box.moon-mode .ground-line {
            background-color: #8888aa; /* Moon Dust */
        }

        /* THE DINO (Green Player) */
        #dino {
            width: 30px;
            height: 30px;
            background-color: #00ff88; 
            border: 2px solid #009944;
            border-radius: 4px;
            position: absolute;
            bottom: 6px;
            left: 20px;
            box-shadow: 0px 0px 6px rgba(0,0,0,0.3);
            transition: width 0.3s ease, height 0.3s ease, opacity 0.1s ease;
        }

        .invulnerable {
            background-color: #ffaa00 !important;
            opacity: 0.5;
        }

        /* ENEMY (Cactus / Alien) */
        #cactus {
            width: 20px;
            height: 30px;
            background-color: #ff3333; 
            border: 2px solid #990000;
            border-radius: 3px;
            position: absolute;
            bottom: 6px;
            left: 320px;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: width 0.3s ease, height 0.3s ease;
        }

        #game-box.moon-mode #cactus {
            background-color: #a020f0; /* Alien Purple */
            border-color: #d87093;
            box-shadow: 0px 0px 8px #a020f0;
        }

        .jump-animation {
            animation: jump 0.6s ease-in-out;
        }

        @keyframes jump {
            0% { bottom: 6px; }
            50% { bottom: var(--jump-height, 130px); }
            100% { bottom: 6px; }
        }

        /* HUD & STATS */
        .stats-panel {
            display: flex;
            justify-content: space-around;
            width: 320px;
            margin: 10px auto;
            font-size: 1rem;
            font-weight: bold;
        }

        #health-bar { color: #ff3333; letter-spacing: 2px; }
        #distance-board { color: #00ccff; }
        #score-board { color: #ffff55; font-size: 1.1rem; font-weight: bold; }
        #location-tag { color: #00ff88; font-weight: bold; margin-top: 5px; height: 20px; }

        /* START BUTTON */
        #start-btn {
            background-color: #00ff88;
            color: #000000;
            border: none;
            padding: 10px 24px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 10px;
            box-shadow: 0px 4px 10px rgba(0, 255, 136, 0.4);
        }

        #start-btn:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <h1>Free Games</h1>
    
    <div id="game-box" onclick="jump()">
        <div class="sun"></div>
        <div class="moon-graphic"></div>
        <div class="cloud cloud-1"></div>
        <div class="cloud cloud-2"></div>
        <div id="dino"></div>
        <div id="cactus"></div>
        <div class="ground-line"></div>
    </div>

    <div id="location-tag">EARTH ATMOSPHERE</div>

    <!-- Stats HUD -->
    <div class="stats-panel">
        <div>HEALTH: <span id="health-bar">❤️❤️❤️</span></div>
        <div>DIST: <span id="distance-board">0</span>m</div>
    </div>

    <div id="score-board">SCORE: <span id="score">0</span></div>

    <!-- Speed Bar Indicator -->
    <div style="margin-top: 10px; font-weight: bold; font-size: 0.85rem;">
        SPEED LEVEL
        <div style="width: 200px; height: 12px; background-color: #222; border: 2px solid #555; margin: 5px auto; border-radius: 4px; overflow: hidden;">
            <div id="speed-bar" style="width: 20%; height: 100%; background-color: #00ff88; transition: width 0.3s ease;"></div>
        </div>
    </div>

    <button id="start-btn" onclick="startGame()">Start Game</button>

    <p style="color: #aaa; font-size: 0.85rem;">Tap inside the box to jump!</p>

    <script>
        const dino = document.getElementById("dino");
        const cactus = document.getElementById("cactus");
        const scoreDisplay = document.getElementById("score");
        const distanceDisplay = document.getElementById("distance-board");
        const healthDisplay = document.getElementById("health-bar");
        const speedBar = document.getElementById("speed-bar");
        const startBtn = document.getElementById("start-btn");
        const gameBox = document.getElementById("game-box");
        const locationTag = document.getElementById("location-tag");

        let score = 0;
        let distance = 0;
        let lives = 3;
        let baseSpeed = 4; 
        let currentSpeed = baseSpeed;
        let maxSpeed = 8; 
        let currentScale = 1;
        let isAlive = false; 
        let gameRunning = false;
        let isInvulnerable = false;
        let cactusLeft = 320;
        let isMoonMode = false;

        function updateHealthUI() {
            if (lives === 3) healthDisplay.innerText = "❤️❤️❤️";
            else if (lives === 2) healthDisplay.innerText = "❤️❤️🖤";
            else if (lives === 1) healthDisplay.innerText = "❤️🖤🖤";
            else healthDisplay.innerText = "🖤🖤🖤";
        }

        function startGame() {
            if (gameRunning) return;

            // Reset Logic
            score = 0;
            distance = 0;
            lives = 3;
            currentSpeed = baseSpeed;
            currentScale = 1;
            cactusLeft = 320;
            isAlive = true;
            gameRunning = true;
            isInvulnerable = false;
            isMoonMode = false;

            // Reset UI
            scoreDisplay.innerText = score;
            distanceDisplay.innerText = distance;
            locationTag.innerText = "EARTH ATMOSPHERE";
            locationTag.style.color = "#00ff88";
            updateHealthUI();
            
            speedBar.style.width = "20%";
            gameBox.classList.remove("moon-mode");
            dino.classList.remove("invulnerable");

            dino.style.width = "30px";
            dino.style.height = "30px";
            cactus.style.width = "20px";
            cactus.style.height = "30px";
            cactus.style.left = "320px";
            cactus.innerText = "";

            startBtn.style.display = "none";
            moveEnemy();
        }

        function jump() {
            if (!dino.classList.contains("jump-animation") && isAlive) {
                // High Jump inside frame bounds
                let jumpPeak = isMoonMode ? 140 : 120; 

                document.documentElement.style.setProperty('--jump-height', jumpPeak + 'px');

                dino.classList.add("jump-animation");
                
                setTimeout(function() {
                    dino.classList.remove("jump-animation");
                }, 600);
            }
        }

        function moveEnemy() {
            if (!isAlive) return;

            cactusLeft -= currentSpeed; 
            
            // Fast distance counter (Reaches 10,000m quickly)
            distance += Math.floor(currentSpeed * 2);
            distanceDisplay.innerText = distance;

            // TRIGGER MOON MODE AT 10,000 METERS!
            if (distance >= 10000 && !isMoonMode) {
                isMoonMode = true;
                gameBox.classList.add("moon-mode");
                locationTag.innerText = "🌕 MOON EXPLORATION MODE";
                locationTag.style.color = "#a020f0";
                cactus.innerText = "👽"; 
            }

            // Obstacle reset when it passes screen
            if (cactusLeft < -25) {
                cactusLeft = 320; 
                score++;
                scoreDisplay.innerText = score;

                if (score > 0 && score % 5 === 0) {
                    if (currentSpeed < maxSpeed) {
                        currentSpeed += 0.5;
                    }
                    speedBar.style.width = Math.min(100, (currentSpeed / maxSpeed) * 100) + "%";
                }
            }
            
            cactus.style.left = cactusLeft + "px";
            
            // Collision Detection & Alien Stomp
            let dinoBottom = parseInt(window.getComputedStyle(dino).getPropertyValue("bottom"));

            if (cactusLeft > 15 && cactusLeft < 45) {
                // ALIEN STOMP CHECK (If dino lands on top of Alien)
                if (isMoonMode && dinoBottom > 15) {
                    score += 5; // Bonus Points!
                    scoreDisplay.innerText = score;
                    cactusLeft = 320; // Squash Alien and spawn new one
                } 
                // NORMAL SIDE COLLISION
                else if (!isInvulnerable && dinoBottom < 25) {
                    lives--;
                    updateHealthUI();

                    if (lives <= 0) {
                        isAlive = false;
                        gameRunning = false;
                        startBtn.innerText = "Play Again";
                        startBtn.style.display = "inline-block";
                        alert("Game Over! Final Score: " + score + " | Distance: " + distance + "m");
                        return;
                    } else {
                        isInvulnerable = true;
                        dino.classList.add("invulnerable");

                        setTimeout(function() {
                            isInvulnerable = false;
                            dino.classList.remove("invulnerable");
                        }, 1000);
                    }
                }
            }

            requestAnimationFrame(moveEnemy);
        }
    </script>

</body>
    </html>
