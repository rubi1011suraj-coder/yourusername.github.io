<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free Games</title>
    <style>
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
        }

        #game-box {
            width: 320px; 
            height: 150px;
            background-color: #222222;
            position: relative;
            margin: 20px auto;
            border: 3px solid #ffffff;
            overflow: hidden;
        }

        /* THE DINO (Green Square) */
        #dino {
            width: 30px;
            height: 30px;
            background-color: #00ff88; 
            position: absolute;
            bottom: 0;
            left: 20px;
        }

        /* THE CACTUS (Red Square) */
        #cactus {
            width: 20px;
            height: 30px;
            background-color: #ff3333; 
            position: absolute;
            bottom: 0;
            left: 320px;
        }

        .jump-animation {
            animation: jump 0.5s linear;
        }

        @keyframes jump {
            0% { bottom: 0; }
            50% { bottom: 80px; }
            100% { bottom: 0; }
        }

        #score-board {
            font-size: 1.2rem;
            margin-top: 10px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>Free Games</h1>
    
    <div id="game-box" onclick="jump()">
        <div id="dino"></div>
        <div id="cactus"></div>
    </div>
<!-- Speed Bar Display -->
<div style="margin-top: 10px; font-weight: bold;">
    Speed Level:
    <div style="width: 200px; height: 15px; background-color: #444; border: 2px solid #fff; margin: 5px auto; border-radius: 3px; overflow: hidden;">
        <div id="speed-bar" style="width: 20%; height: 100%; background-color: #00ff88; transition: width 0.3s ease;"></div>
    </div>
</div>
    
    <div id="score-board">Score: <span id="score">0</span></div>
    <p>Tap the dark grey box to jump!</p>

    <script>
        const dino = document.getElementById("dino");
        const cactus = document.getElementById("cactus");
        const scoreDisplay = document.getElementById("score");

        let score = 0;
        let baseSpeed = 4; // Starting speed of the red block
        let currentSpeed = baseSpeed;
        let isAlive = true;

        function jump() {
            if (!dino.classList.contains("jump-animation") && isAlive) {
                dino.classList.add("jump-animation");
                
                setTimeout(function() {
                    dino.classList.remove("jump-animation");
                }, 500);
            }
        }

        let cactusLeft = 320;
        
        function moveEnemy() {
            if (!isAlive) return;

            cactusLeft -= currentSpeed; // Moves using the dynamic speed variable
            
            if (cactusLeft < -20) {
                cactusLeft = 320; // Reset position
                score++;
                scoreDisplay.innerText = score;

                // EVERY 5 POINTS: Increase speed by 1
                if (score > 0 && score % 5 === 0) {
                    currentSpeed += 1; 
                    console.log("Speed increased! Current speed: " + currentSpeed);
                }
            }
            
            cactus.style.left = cactusLeft + "px";
            
            // Collision check
            let dinoBottom = parseInt(window.getComputedStyle(dino).getPropertyValue("bottom"));
            if (cactusLeft > 20 && cactusLeft < 50 && dinoBottom < 30) {
                isAlive = false;
                alert("Game Over! Final Score: " + score);
                
                // Reset everything back to start configurations
                score = 0;
                currentSpeed = baseSpeed;
                scoreDisplay.innerText = score;
                cactusLeft = 320;
                isAlive = true;
            }

            requestAnimationFrame(moveEnemy);
        }

        moveEnemy();
    </script>

</body>
</html>
