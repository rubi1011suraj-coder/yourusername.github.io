<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free Games</title>
    <style>
        /* CSS: This handles how everything looks */
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
        }

        #game-box {
            width: 320px; /* Small fixed width so it perfectly fits any mobile screen */
            height: 150px;
            background-color: #222222;
            position: relative;
            margin: 20px auto;
            border: 3px solid #ffffff;
            overflow: hidden;
        }

        /* THE DINO (Green Square) */
        #dino {
            width: 30px;
            height: 30px;
            background-color: #00ff88; /* Bright neon green */
            position: absolute;
            bottom: 0;
            left: 20px;
        }

        /* THE CACTUS (Red Square) */
        #cactus {
            width: 20px;
            height: 30px;
            background-color: #ff3333; /* Bright red */
            position: absolute;
            bottom: 0;
            left: 300px;
        }

        /* CSS Animation for jumping */
        .jump-animation {
            animation: jump 0.5s linear;
        }

        @keyframes jump {
            0% { bottom: 0; }
            50% { bottom: 80px; }
            100% { bottom: 0; }
        }
    </style>
</head>
<body>

    <h1>Free Games</h1>
    
    <!-- The Game Window -->
    <div id="game-box" onclick="jump()">
        <div id="dino"></div>
        <div id="cactus"></div>
    </div>

    <p>Tap the dark grey box to jump!</p>

    <script>
        // JS: This handles the game actions and physics
        const dino = document.getElementById("dino");
        const cactus = document.getElementById("cactus");

        function jump() {
            if (!dino.classList.contains("jump-animation")) {
                dino.classList.add("jump-animation");
                
                // Remove the animation class after 500ms so you can jump again
                setTimeout(function() {
                    dino.classList.remove("jump-animation");
                }, 500);
            }
        }

        // Move the cactus across the screen
        let cactusLeft = 300;
        
        function moveEnemy() {
            cactusLeft -= 4; // Moves the red block left
            
            if (cactusLeft < -20) {
                cactusLeft = 320; // Resets it to the right side
            }
            
            cactus.style.left = cactusLeft + "px";
            
            // Basic collision check
            let dinoBottom = parseInt(window.getComputedStyle(dino).getPropertyValue("bottom"));
            if (cactusLeft > 20 && cactusLeft < 50 && dinoBottom < 30) {
                alert("Game Over! Try again.");
                cactusLeft = 320;
            }

            requestAnimationFrame(moveEnemy);
        }

        // Start moving the block
        moveEnemy();
    </script>

</body>
</html>
