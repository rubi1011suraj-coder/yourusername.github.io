<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free Games - Java Arcade</title>
    <style>
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            user-select: none;
            -webkit-user-select: none;
        }

        .header-title {
            text-align: center;
            margin-top: 10px;
            font-size: 2.2rem;
            color: #55ff55; 
            text-shadow: 3px 3px #003300;
            text-transform: uppercase;
        }

        /* Responsive Game Box */
        #game-container {
            width: 95%;
            max-width: 500px;
            height: 200px;
            position: relative;
            background-color: #1a1a1a;
            margin-top: 20px;
            overflow: hidden;
            border: 4px solid #4a4a4a;
            box-shadow: 0px 0px 15px rgba(0, 255, 0, 0.2);
        }

        .ground {
            width: 100%;
            height: 20px;
            background-color: #5c3a21;
            border-top: 5px solid #55ff55;
            position: absolute;
            bottom: 0;
            left: 0;
            z-index: 2;
        }

        /* Player Character */
        #dino {
            width: 30px;
            height: 40px;
            background-color: #00a86b; 
            border: 2px solid #005c3e;
            position: absolute;
            bottom: 20px; 
            left: 30px; /* Moved slightly right so it's clearly visible */
            z-index: 3;
        }

        /* Enemy Obstacle */
        #cactus {
            width: 20px;
            height: 35px;
            background-color: #ff2222; 
            border: 2px solid #880000;
            position: absolute;
            bottom: 20px;
            right: -30px;
            z-index: 3;
        }

        .jump {
            animation: jump-animation 0.55s cubic-bezier(0.25, 1, 0.5, 1);
        }

        @keyframes jump-animation {
            0% { bottom: 20px; }
            50% { bottom: 120px; }
            100% { bottom: 20px; }
        }

        #score-board {
            margin-top: 15px;
            font-size: 1.3rem;
            color: #ffff55;
            text-shadow: 2px 2px #333300;
        }
    </style>
</head>
<body>

    <h1 class="header-title">JAVA RUNNER</h1>
    
    <div id="game-container" onclick="jump()">
        <div id="dino"></div>
        <div id="cactus"></div>
        <div class="ground"></div>
    </div>

    <div id="score-board">SCORE: <span id="score">0</span></div>

    <script>
        const dino = document.getElementById("dino");
        const cactus = document.getElementById("cactus");
        const scoreDisplay = document.getElementById("score");
        const container = document.getElementById("game-container");
        
        let score = 0;
        let isAlive = true;
        let cactusPosition = 500;

        function jump() {
            if (!dino.classList.contains("jump") && isAlive) {
                dino.classList.add("jump");
                setTimeout(function () {
                    dino.classList.remove("jump");
                }, 550);
            }
        }

        document.addEventListener("keydown", function (event) {
            if (event.code === "Space") {
                event.preventDefault();
                jump();
            }
        });

        function gameLoop() {
            if (!isAlive) return;

            // Get the current responsive width of the game container dynamically
            let containerWidth = container.clientWidth;

            cactusPosition -= 5; 
            
            if (cactusPosition < -20) {
                cactusPosition = containerWidth; 
                score++;
                scoreDisplay.innerText = score;
            }
            cactus.style.left = cactusPosition + "px";

            let dinoBottom = parseInt(window.getComputedStyle(dino).getPropertyValue("bottom"));
            
            // Adjusted hitboxes to match the new mobile scale
            if (cactusPosition > 30 && cactusPosition < 60 && dinoBottom <= 55) {
                isAlive = false;
                alert("Game Over! Score: " + score);
                score = 0;
                scoreDisplay.innerText = score;
                cactusPosition = containerWidth;
                isAlive = true;
            }

            requestAnimationFrame(gameLoop);
        }

        // Start loop after a tiny delay to let elements render
        setTimeout(gameLoop, 500);
    </script>

</body>
</html>
